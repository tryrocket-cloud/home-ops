services:
  upsnap:
    container_name: upsnap
    image: ghcr.io/seriousm4x/upsnap:4@sha256:f39ee945065d4bc1649ae47d6d96148f848aa019017eae3b81c2dca140b9510b
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./upsnap/data:/app/pb_data
    environment:
      - TZ=Europe/Berlin
      - UPSNAP_INTERVAL=@every 5m
      - UPSNAP_SCAN_RANGE=192.168.178.0/24
      - UPSNAP_WEBSITE_TITLE=Rocket Cloud
