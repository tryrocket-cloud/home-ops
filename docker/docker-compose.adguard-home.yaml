services:
  adguardhome:
    image: adguard/adguardhome:latest@sha256:2979cc78a28aceb77f90980a5440578dbb7bc406dffe261e9ae402750193bde0
    container_name: adguardhome
    restart: unless-stopped
    ports:
      - "3001:80"
      - "3000:3000"
      - "53:53/tcp"
      - "53:53/udp"
    volumes:
      - ./adguard/work:/opt/adguardhome/work
      - ./adguard/conf:/opt/adguardhome/conf
