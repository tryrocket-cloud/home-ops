version: "3.8"

services:
  caddy:
    image: ghcr.io/tryrocket-cloud/tryrocket-cloud:caddy@sha256:9bcfe28fa679e60e86569fe8eca366c8828a8725416358169f8c34dbc570257c
    container_name: caddy
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}

volumes:
  caddy_data:
  caddy_config:

networks:
  immich_default:
    external: true