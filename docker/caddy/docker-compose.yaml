services:
  caddy:
    image: ghcr.io/caddybuilds/caddy-cloudflare:latest@sha256:6b14ce406f8ac55d73285e156574844fb76782a98b22dd06d68250aca5b7568a
    container_name: caddy
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - /home/dietpi/portainer/data/compose/7/docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      # - /etc/ca.crt:/etc/ca.crt
      - ./data:/data
      - ./config:/config
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    networks:
      - mafl_default
      - semaphoreui_default
      - portainer_default
      - pocket-id_default

networks:
  mafl_default:
    external: true
  semaphoreui_default:
    external: true
  portainer_default:
    external: true
  pocket-id_default:
    external: true