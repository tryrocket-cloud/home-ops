apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-vault-export
spec:
  suspend: false
  schedule: "0 22 * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: backup-vault-export
              image: ghcr.io/tryrocket-cloud/home-ops:toolkit@sha256:a6015ca4efbf86ea07c2a04179e5e27885c7c913e12ce2b47b6a26b133d663b6
              imagePullPolicy: Always
              env:
                - name: RESTIC_CACHE_DIR
                  value: /root/.cache/restic/vault
                - name: KOPIA_CACHE_DIRECTORY
                  value: /root/.cache/kopia/vault
                - name: HOSTNAME
                  value: tryrocket.cloud
              envFrom:
                - secretRef:
                    name: all-in-one
              args: ["backup-vault"]
              volumeMounts:
                - name: support-volume
                  mountPath: /root/.cache
                  readOnly: false
          volumes:
            - name: support-volume
              persistentVolumeClaim:
                claimName: vault-support-pvc
